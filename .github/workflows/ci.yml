name: Runtime Memory Pipeline CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile artifacts
        run: python sample-code/build_artifacts.py

      - name: Validate binary artifacts
        run: python sample-code/binary_backend.py sample-artifacts/binary

      - name: Execute benchmark
        run: python sample-code/run_benchmark.py
